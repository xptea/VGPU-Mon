name: Feature request
description: Suggest a focused improvement.
title: '[Feature] '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the command, interaction, or output you would expect.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives and compatibility
      description: Note alternatives and relevant Windows, GPU-vendor, or terminal constraints.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and requests.
          required: true
