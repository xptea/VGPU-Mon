name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: C security analysis
    # CodeQL's C/C++ extractor supports Microsoft compiler extensions through
    # Visual Studio 2022. Keep analysis on that image even when CI advances.
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: c-cpp
          build-mode: manual
          queries: security-and-quality

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build\codeql -A x64

      - name: Build under CodeQL tracing
        shell: pwsh
        run: cmake --build build\codeql --config Release --parallel

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:c-cpp
